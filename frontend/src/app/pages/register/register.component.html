<section class="page login-page">
  <div class="card login-card">
    <div class="login-icon" aria-hidden="true">✨</div>
    <h1>Crear cuenta</h1>
    <p>Regístrate para reservar entradas y llevar el control de tus compras.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Nombre completo
        <input type="text" formControlName="fullName" autocomplete="name" placeholder="Tu nombre" />
      </label>
      <label>
        Correo electrónico
        <input type="email" formControlName="email" autocomplete="email" placeholder="tu@correo.com" />
      </label>
      <label>
        Contraseña
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" />
      </label>

      @if (error()) {
        <p class="alert error">{{ error() }}</p>
      }

      <button type="submit" class="btn primary" [disabled]="loading()">
        {{ loading() ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth-switch">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </p>
    <a routerLink="/" class="back-link">← Volver al inicio</a>
  </div>
</section>
