<section class="page login-page">
  <div class="card login-card">
    <div class="login-icon" aria-hidden="true">👤</div>
    <h1>Iniciar sesión</h1>
    <p>Ingresa con tu cuenta para reservar entradas o gestionar eventos.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Correo o usuario
        <input type="text" formControlName="username" autocomplete="username" placeholder="tu@correo.com o admin" />
      </label>
      <label>
        Contraseña
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      </label>

      @if (error()) {
        <p class="alert error">{{ error() }}</p>
      }

      <button type="submit" class="btn primary" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="auth-switch">
      ¿No tienes cuenta?
      <a routerLink="/register">Crear cuenta</a>
    </p>
    <a routerLink="/" class="back-link">← Volver al inicio</a>
  </div>
</section>
