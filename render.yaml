services:
  - type: web
    name: eventosvivos-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /swagger/index.html
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/app/data/eventosvivos.db

  - type: web
    name: eventosvivos-web
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm ci && npm run build:production
    staticPublishPath: frontend/dist/eventos-vivos-web/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: eventosvivos-api
          property: url
