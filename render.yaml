services:
  - type: web
    name: eventosvivos-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/app/data/eventosvivos.db

  - type: web
    name: eventosvivos-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build:production && test -f dist/eventos-vivos-web/browser/index.html
    staticPublishPath: dist/eventos-vivos-web/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: API_URL
        fromService:
          type: web
          name: eventosvivos-api
          property: host
